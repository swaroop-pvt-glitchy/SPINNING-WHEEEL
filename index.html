<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spin Wheel Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Spin Wheel Game</h1>
        
        <!-- Mode Selection -->
        <div class="mode-selector">
            <h2>Select Mode:</h2>
            <div class="mode-buttons">
                <button class="mode-btn active" data-mode="soft">Soft</button>
                <button class="mode-btn" data-mode="extreme">Extreme</button>
                <button class="mode-btn" data-mode="rough">Rough (Wild)</button>
            </div>
        </div>

        <!-- Wheels Container -->
        <div class="wheels-container">
            <!-- Action Wheel -->
            <div class="wheel-box">
                <h2>Action</h2>
                <div class="display-box">
                    <div class="spinner" id="actionSpinner"></div>
                    <div class="result" id="actionResult">Select Mode & Spin</div>
                </div>
            </div>

            <!-- Where Wheel -->
            <div class="wheel-box">
                <h2>Where</h2>
                <div class="display-box">
                    <div class="spinner" id="whereSpinner"></div>
                    <div class="result" id="whereResult">Select Mode & Spin</div>
                </div>
            </div>
        </div>

        <!-- Spin Button -->
        <button class="spin-btn" id="spinBtn">SPIN</button>

        <!-- History (to prevent repeats) -->
        <div class="history">
            <p id="historyText">Previous combinations will not repeat</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
